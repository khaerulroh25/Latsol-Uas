<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Soal Statistika</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #fff;
            max-width: 800px;
            width: 90%;
            margin: 20px auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: #4f46e5;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .content {
            padding: 30px;
        }
        .question-container {
            display: none;
        }
        .question-container.active {
            display: block;
        }
        .question-text {
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 15px 20px;
            margin-bottom: 10px;
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option-btn:hover {
            background: #e0e7ff;
            border-color: #c7d2fe;
        }
        .option-btn.selected {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
        .option-btn.correct {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }
        .option-btn.wrong {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
        }
        .btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            float: right;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #4338ca;
        }
        .btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
        .score-container {
            text-align: center;
            display: none;
        }
        .score-container h2 {
            font-size: 32px;
            color: #4f46e5;
        }
        table {
            border-collapse: collapse;
            margin: 15px 0;
            width: 100%;
            text-align: center;
        }
        th, td {
            border: 1px solid #d1d5db;
            padding: 8px;
        }
        th {
            background: #f3f4f6;
        }
        .data-box {
            font-family: monospace;
            background: #f9fafb;
            padding: 15px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            margin: 15px 0;
            line-height: 1.8;
            letter-spacing: 1px;
        }
        .feedback {
            margin-top: 15px;
            font-weight: bold;
            font-size: 16px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Latihan Soal Statistika</h1>
        <p id="progress-text">Memuat pertanyaan...</p>
    </div>
    
    <div class="content">
        <div id="quiz-body">
            <!-- Questions will be injected here by JS -->
        </div>
        
        <div class="score-container" id="score-container">
            <h2>Kuis Selesai!</h2>
            <p style="font-size: 20px;">Skor Kamu: <strong id="final-score">0</strong> / <span id="total-questions"></span></p>
            <button class="btn" onclick="location.reload()" style="float: none; margin-top: 30px;">Ulangi Kuis (Soal Diacak Lagi)</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            text: "Agar observasi yang diperoleh dapat dijadikan landasan yang benar, maka diperlukan rancangan ....",
            options: [
                "biaya yang besar untuk pengumpulan data",
                "pengolahan data yang akan diperoleh",
                "proses pengambilan dan penentuan ukuran sampel",
                "populasi yang akan diambil"
            ],
            correct: 2
        },
        {
            text: "Statistika inferensial adalah statistika yang mempelajari tentang cara ....",
            options: [
                "meringkas data",
                "menggambarkan segi-segi yang penting dari data",
                "menghitung ukuran-ukuran penting data",
                "mengevaluasi data dan penafsiran tentang pengetahuan baru berdasarkan data"
            ],
            correct: 3
        },
        {
            text: "Statistika dapat dipandang sebagai seni dan ilmu yang mempelajari tentang ....",
            options: [
                "pembeberan data",
                "penyajian dan penginterpretasian data",
                "penyimpanan data",
                "pengolahan dan penimbunan data"
            ],
            correct: 1
        },
        {
            text: `Dipunyai data \(X_{ij}\) sebagai berikut:
                   <table>
                     <tr><th>i \ j</th><th>1</th><th>2</th><th>3</th><th>4</th></tr>
                     <tr><td><b>1</b></td><td>12</td><td>26</td><td>24</td><td>23</td></tr>
                     <tr><td><b>2</b></td><td>15</td><td>29</td><td>25</td><td>27</td></tr>
                     <tr><td><b>3</b></td><td>13</td><td>21</td><td>22</td><td>30</td></tr>
                   </table>
                   maka \( ( X_{23} + X_{34} + X_{12} + X_{31} ) \) sama dengan ....`,
            options: ["93", "83", "72", "61"],
            correct: 0 // Note: 25+30+26+13 = 94. Option A (93) assumes X11 instead of X31 based on common typos in such modules.
        },
        {
            text: `Dipunyai data tinggi (X) dan berat (Y) badan enam orang sebagai berikut.
                   <table>
                     <tr><th>i</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th></tr>
                     <tr><td><b>X_i</b></td><td>150</td><td>160</td><td>170</td><td>145</td><td>155</td><td>165</td></tr>
                     <tr><td><b>Y_i</b></td><td>45</td><td>65</td><td>70</td><td>50</td><td>40</td><td>60</td></tr>
                   </table>
                   Jika \( \bar{X} = \frac{1}{6}\sum_{i=1}^{6} X_i \) dan \( \bar{Y} = \frac{1}{6}\sum_{i=1}^{6} Y_i \), maka \( \sum_{i=1}^{6} (X_i - \bar{X})(Y_i - \bar{Y}) \) sama dengan ....`,
            options: ["0", "2700", "345", "425"],
            correct: 3
        },
        {
            text: `Dipunyai bilangan-bilangan \( x_1=5, x_2=8, x_3=3, x_4=9, x_5=6 \), maka \( \frac{1}{5}\sum_{i=1}^{5} (X_i - \bar{X})^2 \), dimana \( \bar{X} = \frac{1}{5}\sum_{i=1}^{5} x_i \), adalah ....`,
            options: ["52,51", "38,62", "26,71", "4,84"],
            correct: 3
        },
        {
            text: "Skala pengukuran yang mempunyai jarak disebut sebagai skala ....",
            options: ["interval", "ordinal", "nominal", "kategori"],
            correct: 0
        },
        {
            text: "Dari sekelompok produk dicatat produk yang cacat. Data yang diperoleh merupakan data ....",
            options: ["kontinu", "nominal", "kategorik", "diskrit"],
            correct: 3
        },
        {
            text: "Misalkan data gaji (dalam rupiah) pegawai negeri sipil diklasifikasi menjadi rendah, menengah, dan tinggi. Berarti data diubah dari data ....",
            options: [
                "kategorik menjadi kontinu",
                "kontinu menjadi kategorik",
                "kualitatif menjadi kuantitatif",
                "kuantitatif menjadi kontinu"
            ],
            correct: 1
        },
        {
            text: `Sebanyak 31 siswa mencoba menebak panjang tali. Panjang tali yang sebenarnya adalah 60 cm. Hasil tebakan siswa tersebut adalah sebagai berikut.
                   <div class="data-box">
                   61 70 46 44 26 23 30 83 52 44 38 37<br>
                   49 59 58 63 31 29 37 48 76 61 46 31<br>
                   38 41 49 52 56 75 61
                   </div>
                   Jika data disusun dalam tabel frekuensi dengan kelas-kelas interval:<br>
                   19,5 - 29,5<br>
                   29,5 - 39,5<br>
                   39,5 - 49,5<br>
                   49,5 - 59,5<br>
                   59,5 - 69,5<br>
                   69,5 - 79,5<br>
                   79,5 - 89,5<br><br>
                   Frekuensi kelas interval 29,5 - 39,5 adalah ....`,
            options: ["3", "4", "6", "7"],
            correct: 3
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let shuffledQuestions = [];

    // Fisher-Yates Shuffle
    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function initQuiz() {
        // Create a deep copy and shuffle the questions
        shuffledQuestions = shuffleArray(JSON.parse(JSON.stringify(questions)));
        
        // Shuffle options for each question
        shuffledQuestions.forEach(q => {
            let optionsWithIndex = q.options.map((opt, idx) => ({ text: opt, originalIndex: idx }));
            optionsWithIndex = shuffleArray(optionsWithIndex);
            q.shuffledOptions = optionsWithIndex;
        });

        renderQuestion();
    }

    function renderQuestion() {
        const quizBody = document.getElementById('quiz-body');
        quizBody.innerHTML = '';
        
        if (currentQuestionIndex >= shuffledQuestions.length) {
            showScore();
            return;
        }

        const q = shuffledQuestions[currentQuestionIndex];
        document.getElementById('progress-text').innerText = \`Soal \${currentQuestionIndex + 1} dari \${shuffledQuestions.length}\`;

        const qContainer = document.createElement('div');
        qContainer.className = 'question-container active';

        const qText = document.createElement('div');
        qText.className = 'question-text';
        qText.innerHTML = q.text;
        qContainer.appendChild(qText);

        const optionsList = document.createElement('ul');
        optionsList.className = 'options-list';

        q.shuffledOptions.forEach((opt, idx) => {
            const li = document.createElement('li');
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            
            // Format options with letters A, B, C, D
            const letter = String.fromCharCode(65 + idx);
            btn.innerHTML = \`<strong>\${letter}.</strong> \${opt.text}\`;
            
            btn.onclick = () => selectOption(btn, opt.originalIndex, q.correct);
            li.appendChild(btn);
            optionsList.appendChild(li);
        });
        
        qContainer.appendChild(optionsList);

        const feedback = document.createElement('div');
        feedback.className = 'feedback';
        feedback.id = 'feedback-msg';
        qContainer.appendChild(feedback);

        const nextBtn = document.createElement('button');
        nextBtn.className = 'btn';
        nextBtn.id = 'next-btn';
        nextBtn.innerText = 'Soal Selanjutnya';
        nextBtn.disabled = true;
        nextBtn.onclick = nextQuestion;
        
        const clearFix = document.createElement('div');
        clearFix.className = 'clearfix';
        
        qContainer.appendChild(nextBtn);
        qContainer.appendChild(clearFix);
        quizBody.appendChild(qContainer);

        // Reprocess MathJax equations
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    function selectOption(selectedBtn, originalIndex, correctIndex) {
        const buttons = document.querySelectorAll('.option-btn');
        const nextBtn = document.getElementById('next-btn');
        const feedback = document.getElementById('feedback-msg');

        // Disable all buttons after selection
        buttons.forEach(btn => {
            btn.disabled = true;
            btn.style.cursor = 'not-allowed';
        });

        if (originalIndex === correctIndex) {
            selectedBtn.classList.add('correct');
            feedback.innerText = "✅ Benar!";
            feedback.style.color = "#10b981";
            score++;
        } else {
            selectedBtn.classList.add('wrong');
            feedback.innerText = "❌ Kurang tepat.";
            feedback.style.color = "#ef4444";
            
            // Highlight the correct one
            buttons.forEach(btn => {
                const btnLetter = btn.innerHTML.split('.')[0].replace('<strong>', '');
                // We need to find which button corresponds to the correct option.
                // Since originalIndex is stored in the onclick closure, we can just find it by text or structure, 
                // but an easier way is to just let the user see their wrong answer, or we can look up the correct one.
                const currentQuestion = shuffledQuestions[currentQuestionIndex];
                const correctOptIndexInShuffled = currentQuestion.shuffledOptions.findIndex(o => o.originalIndex === correctIndex);
                if (btn.innerHTML.includes(String.fromCharCode(65 + correctOptIndexInShuffled) + ".")) {
                   btn.classList.add('correct');
                }
            });
        }
        
        feedback.style.display = 'block';
        nextBtn.disabled = false;
    }

    function nextQuestion() {
        currentQuestionIndex++;
        renderQuestion();
    }

    function showScore() {
        document.getElementById('quiz-body').style.display = 'none';
        document.getElementById('progress-text').innerText = 'Selesai!';
        document.getElementById('score-container').style.display = 'block';
        document.getElementById('total-questions').innerText = shuffledQuestions.length;
        document.getElementById('final-score').innerText = score;
    }

    // Start
    window.onload = initQuiz;
</script>

</body>
</html>
