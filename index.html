      let currentQuestionIndex = 0;
      let score = 0;
      let shuffledQuestions = [];

      function shuffleArray(array) {
        let currentIndex = array.length,
          randomIndex;
        while (currentIndex !== 0) {
          randomIndex = Math.floor(Math.random() * currentIndex);
          currentIndex--;
          [array[currentIndex], array[randomIndex]] = [
            array[randomIndex],
            array[currentIndex],
          ];
        }
        return array;
      }

      function initQuiz() {
        shuffledQuestions = shuffleArray(JSON.parse(JSON.stringify(questions)));

        shuffledQuestions.forEach((q) => {
          let optionsWithIndex = q.options.map((opt, idx) => ({
            text: opt,
            originalIndex: idx,
          }));
          optionsWithIndex = shuffleArray(optionsWithIndex);
          q.shuffledOptions = optionsWithIndex;
        });

        renderQuestion();
      }

      function renderQuestion() {
        const quizBody = document.getElementById("quiz-body");
        quizBody.innerHTML = "";

        if (currentQuestionIndex >= shuffledQuestions.length) {
          showScore();
          return;
        }

        const q = shuffledQuestions[currentQuestionIndex];
        document.getElementById("progress-text").innerText =
          `Soal ${currentQuestionIndex + 1} dari ${shuffledQuestions.length}`;

        const qContainer = document.createElement("div");
        qContainer.className = "question-container active";

        const qText = document.createElement("div");
        qText.className = "question-text";
        qText.innerHTML = q.text;
        qContainer.appendChild(qText);

        const optionsList = document.createElement("ul");
        optionsList.className = "options-list";

        q.shuffledOptions.forEach((opt, idx) => {
          const li = document.createElement("li");
          const btn = document.createElement("button");
          btn.className = "option-btn";

          const letter = String.fromCharCode(65 + idx);
          btn.innerHTML = `<strong>${letter}.</strong> ${opt.text}`;

          btn.onclick = () => selectOption(btn, opt.originalIndex, q.correct);
          li.appendChild(btn);
          optionsList.appendChild(li);
        });

        qContainer.appendChild(optionsList);

        const feedback = document.createElement("div");
        feedback.className = "feedback";
        feedback.id = "feedback-msg";
        qContainer.appendChild(feedback);

        const nextBtn = document.createElement("button");
        nextBtn.className = "btn";
        nextBtn.id = "next-btn";
        nextBtn.innerText = "Soal Selanjutnya";
        nextBtn.disabled = true;
        nextBtn.onclick = nextQuestion;

        const clearFix = document.createElement("div");
        clearFix.className = "clearfix";

        qContainer.appendChild(nextBtn);
        qContainer.appendChild(clearFix);
        quizBody.appendChild(qContainer);

        if (window.MathJax) {
          MathJax.typesetPromise();
        }
      }

      function selectOption(selectedBtn, originalIndex, correctIndex) {
        const buttons = document.querySelectorAll(".option-btn");
        const nextBtn = document.getElementById("next-btn");
        const feedback = document.getElementById("feedback-msg");

        buttons.forEach((btn) => {
          btn.disabled = true;
          btn.style.cursor = "not-allowed";
        });

        if (originalIndex === correctIndex) {
          selectedBtn.classList.add("correct");
          feedback.innerText = "✅ Benar!";
          feedback.style.color = "#10b981";
          score++;
        } else {
          selectedBtn.classList.add("wrong");
          feedback.innerText = "❌ Kurang tepat.";
          feedback.style.color = "#ef4444";

          const currentQuestion = shuffledQuestions[currentQuestionIndex];
          const correctOptIndexInShuffled =
            currentQuestion.shuffledOptions.findIndex(
              (o) => o.originalIndex === correctIndex,
            );

          buttons.forEach((btn) => {
            if (
              btn.innerHTML.includes(
                String.fromCharCode(65 + correctOptIndexInShuffled) + ".",
              )
            ) {
              btn.classList.add("correct");
            }
          });
        }

        feedback.style.display = "block";
        nextBtn.disabled = false;
      }

      function nextQuestion() {
        currentQuestionIndex++;
        renderQuestion();
      }

      function showScore() {
        document.getElementById("quiz-body").style.display = "none";
        document.getElementById("progress-text").innerText = "Selesai!";
        document.getElementById("score-container").style.display = "block";
        document.getElementById("total-questions").innerText =
          shuffledQuestions.length;
        document.getElementById("final-score").innerText = score;
      }

      window.onload = initQuiz;
    </script>
  </body>
</html>
